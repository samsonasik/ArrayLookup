name: StructArmed

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  structarmed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Restore StructArmed cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/structarmed
          key: ${{ runner.os }}-structarmed-${{ hashFiles('composer.json', 'composer.lock', 'structarmed.php') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-structarmed-${{ hashFiles('composer.json', 'composer.lock', 'structarmed.php') }}-
            ${{ runner.os }}-structarmed-

      - run: mkdir -p /tmp/structarmed

      - name: Run StructArmed
        run: vendor/bin/structarmed analyze

      - name: Save StructArmed cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/structarmed
          key: ${{ runner.os }}-structarmed-${{ hashFiles('composer.json', 'composer.lock', 'structarmed.php') }}-${{ github.run_id }}-${{ github.run_attempt }}
